<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill: #faf8f8; }
      .frame { fill: none; stroke: #23222140; stroke-width: 2; }
      .col { fill: #ffffff; stroke: #23222126; stroke-width: 1.5; }
      .label { font: 600 14px Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; letter-spacing: 2px; fill: #23222180; }
      .title { font: 700 34px Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #000; }
      .body { font: 18px Newsreader, Georgia, serif; fill: #23222180; }
      .item { font: 22px Newsreader, Georgia, serif; fill: #000; }
      .link { font: 16px Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #C46157; }
      .note { font: 13px Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #23222166; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700"/>

  <!-- 2-column layout: main content | sticky links rail -->
  <rect class="frame" x="60" y="50" width="1080" height="600" rx="10"/>
  <rect class="col" x="90" y="120" width="780" height="530" rx="10"/>
  <rect class="col" x="900" y="120" width="240" height="530" rx="10"/>

  <!-- Header hangs slightly left of the main column start -->
  <text class="title" x="70" y="105">David Bloom</text>
  <text class="note" x="70" y="130">Header aligned to main column, nudged left (“hang”)</text>

  <!-- About (top of main) -->
  <text class="label" x="118" y="180">ABOUT</text>
  <text class="body" x="118" y="215">
    <tspan x="118" dy="0">I study mathematics and philosophy at Yale.</tspan>
    <tspan x="118" dy="26">I write about philosophy, AI, and whatever else</tspan>
    <tspan x="118" dy="26">I find interesting.</tspan>
  </text>

  <!-- Essays (below about) -->
  <text class="label" x="118" y="330">ESSAYS</text>
  <text class="note" x="118" y="365">03.16.2026</text>
  <text class="item" x="118" y="402">A Sample Essay</text>
  <text class="note" x="118" y="442">…list grows downward…</text>

  <!-- Links rail (always accessible; could be sticky) -->
  <text class="label" x="928" y="180">LINKS</text>
  <text class="link" x="928" y="220">RSS</text>
  <text class="link" x="928" y="256">Substack</text>
  <text class="link" x="928" y="292">Email</text>
  <text class="note" x="928" y="330">Sticky rail</text>
</svg>

